spring.application.name=RecommendationServices

# H2 in-memory datasource for local development
spring.datasource.url=jdbc:h2:mem:recommendationdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

